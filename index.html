<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>法硕督学 · 自定义学习舱</title>
<style>
:root{
  --bg:#F8F9FC;--card:#FFFFFF;--accent:#5B9BD5;--accent2:#6BBF8A;--accent3:#F0A060;
  --accent-light:#EDF4FB;--text:#3A3A3A;--sub:#8A8A8A;--shadow:0 2px 12px rgba(0,0,0,0.04);
  --radius:14px;--nav-bg:rgba(255,255,255,0.45);--border:rgba(255,255,255,0.5);
  --nav-blur:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);display:flex;height:100vh;
  overflow:hidden;transition:background .4s,color .4s;
}
body.night{
  --bg:#1E1E1E;--card:#2A2A2A;--text:#E0E0E0;--sub:#A0A0A0;
  --nav-bg:rgba(30,30,30,0.55);--border:rgba(255,255,255,0.06);
  --accent-light:#3A4A5A;--shadow:0 2px 12px rgba(0,0,0,0.3);
}
.app-bg{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;
  background-color:var(--bg);
  background-size:cover;background-position:center;background-repeat:no-repeat;
  transition:background-color .4s;
}
.sidebar{
  width:18%;min-width:170px;max-width:210px;
  background:var(--nav-bg);
  backdrop-filter:blur(var(--nav-blur));
  -webkit-backdrop-filter:blur(var(--nav-blur));
  display:flex;flex-direction:column;align-items:center;
  padding-top:20px;
  border-right:1px solid var(--border);
  flex-shrink:0;gap:2px;overflow-y:auto;
  position:relative;z-index:2;transition:background .3s;
}
.avatar-wrap{
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:6px;
  cursor:pointer;overflow:hidden;position:relative;
  background-size:cover;background-position:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  transition:.3s;border:3px solid rgba(255,255,255,0.6);
  z-index:10;
}
.avatar-wrap:hover{transform:scale(1.06)}
.avatar-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.nick{
  font-size:13px;color:var(--text);margin-bottom:14px;font-weight:600;
  cursor:pointer;padding:3px 10px;border-radius:10px;transition:.2s;
  z-index:10;position:relative;
}
.nick:hover{background:rgba(128,128,128,0.1)}
.nav-item{
  width:calc(100% - 20px);display:flex;flex-direction:column;align-items:center;
  padding:13px 0;margin:2px 10px;border-radius:14px;cursor:pointer;transition:.25s;gap:4px;font-size:13px;
}
.nav-item:hover{background:rgba(255,255,255,0.5)}
.nav-item.active{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}
.nav-item .icon{font-size:22px;position:relative;z-index:1}
.nav-item .label{color:var(--sub);font-size:11px;font-weight:500;position:relative;z-index:1}
.nav-item.active .label{color:var(--accent);font-weight:700}
.achievement-section{width:100%;padding:10px 14px;margin-top:6px;display:flex;flex-direction:column;align-items:center;gap:5px}
.achievement-title{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.achievement-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:5px}
.badge-icon{width:28px;height:28px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:.25s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.badge-icon.earned{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(0,0,0,0.15)}
.badge-icon:hover{transform:scale(1.25)}
.main{flex:1;padding:18px 26px;overflow-y:auto;position:relative;z-index:1;height:100vh;-webkit-overflow-scrolling:touch}
.greeting{font-size:22px;color:var(--accent);margin-bottom:4px;font-weight:700;letter-spacing:0.5px}
.greeting-sub{font-size:12px;color:var(--sub);margin-bottom:14px}
.domains{display:flex;justify-content:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.dom{
  display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:30px;
  background:var(--card);
  box-shadow:var(--shadow);cursor:pointer;font-size:14px;transition:.25s;border:2px solid transparent;
}
.dom.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.dom.active span{color:#fff;font-weight:700}
.module{display:none}
.module.active{display:block}
.card{
  background:var(--card);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;
  box-shadow:var(--shadow);transition:.25s;
}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06)}
.btn{
  background:var(--accent-light);color:var(--accent);border:none;border-radius:30px;
  padding:8px 18px;font-size:13px;cursor:pointer;transition:.25s;white-space:nowrap;
  font-weight:600;display:inline-flex;align-items:center;gap:4px;margin:2px;
  min-height:36px;min-width:44px;
}
.btn:hover{opacity:.9;transform:translateY(-2px)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(0,0,0,0.2)}
.btn2{background:#E8F5EC;color:var(--accent2)}
.btn3{background:#FFF4EB;color:var(--accent3)}
.btn-sm{padding:4px 12px;font-size:11px;min-height:28px;min-width:36px;font-weight:500}
.fab{
  position:fixed;right:34px;bottom:56px;width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:30px;border:none;
  box-shadow:0 6px 24px rgba(0,0,0,0.2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:10;transition:.3s;
}
.fab:hover{transform:scale(1.08)}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.checkbox{
  width:30px;height:30px;border:2px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.25s;font-size:16px;
  color:transparent;
}
.checkbox.done{background:var(--accent);color:#fff}
.modal{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  justify-content:center;align-items:center;z-index:100;
}
.modal.show{display:flex}
.modal-box{
  background:var(--card);border-radius:20px;padding:24px;width:90%;max-width:500px;
  max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.2);
}
.modal-box h3{color:var(--accent);margin-bottom:14px;font-size:18px}
input,textarea,select{
  border:1.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:10px 14px;font-size:14px;
  width:100%;margin:5px 0;font-family:inherit;
  background:var(--card);color:var(--text);transition:.25s;
}
body.night input,body.night textarea,body.night select{border-color:rgba(255,255,255,0.1)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
textarea{min-height:80px;resize:vertical}
.tag{display:inline-block;padding:4px 12px;border-radius:16px;font-size:11px;background:var(--accent-light);margin:2px;cursor:pointer;font-weight:500;transition:.2s}
.tag.active{background:var(--accent);color:#fff}
.badge{display:inline-block;background:var(--accent);color:#fff;border-radius:16px;padding:2px 9px;font-size:10px;margin-left:4px;font-weight:600}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;background:rgba(0,0,0,0.05);min-width:14px;transition:.2s;cursor:pointer}
.heatmap-cell:hover{transform:scale(1.5);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.search-box{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.search-box input{flex:1;min-width:120px;margin:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}
.stat-mini{text-align:center;padding:12px;border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
.stat-mini .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-mini .lbl{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}
.word-table{width:100%;border-collapse:collapse}
.word-table td{padding:10px 12px;vertical-align:middle}
.word-table .en-col{font-size:16px;font-weight:600;text-align:left;width:40%}
.word-table .cn-col{font-size:15px;text-align:left;width:40%;color:var(--sub)}
.word-table .action-col{text-align:right;width:20%}
.word-table tr{border-bottom:1px solid rgba(0,0,0,0.06)}
body.night .word-table tr{border-bottom-color:rgba(255,255,255,0.06)}
.pomodoro-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);
  z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity .4s;
}
.pomodoro-overlay.hidden{opacity:0;pointer-events:none}
.pomodoro-timer{font-size:96px;font-weight:200;color:var(--accent);letter-spacing:6px}
.countdown-badge{
  background:var(--card);border-radius:24px;padding:10px 18px;font-size:14px;font-weight:700;
  box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:8px;color:var(--accent);
}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
</style>
</head>
<body>

<div class="app-bg" id="appBg"></div>
<div class="sidebar" id="sidebar"></div>
<div class="main" id="mainContent">
  <div class="greeting" id="greetingText">👋 早安，小法硕</div>
  <div class="greeting-sub" id="greetingSub">✨ 每一次积累，都在靠近梦想</div>
  <div class="domains" id="domainTabs"></div>
  <div id="dailyModule" class="module active"></div>
  <div id="errorModule" class="module"></div>
  <div id="knowledgeModule" class="module"></div>
  <div id="reciteModule" class="module"></div>
  <div id="englishModule" class="module"></div>
  <div id="settingsModule" class="module"></div>
</div>
<div class="modal" id="modal"></div>
<div id="toastContainer"></div>
<div class="pomodoro-overlay hidden" id="pomodoroOverlay">
  <div class="pomodoro-timer" id="pomodoroTimer">25:00</div>
  <div class="flex" style="gap:10px"><button class="btn btn-sm" onclick="setPomodoro(25)">25分钟</button><button class="btn btn-sm" onclick="setPomodoro(45)">45分钟</button></div>
  <div class="flex" style="gap:10px"><button class="btn btn-primary" id="pomodoroStartBtn" onclick="togglePomodoro()">开始专注</button><button class="btn" onclick="closePomodoro()">退出</button></div>
  <div class="ambient-select" style="display:flex;gap:8px;margin-top:8px">
    <span style="font-size:13px;color:var(--sub)">背景音：</span>
    <span class="ambient-btn active" onclick="setAmbient('none')">🔇 无</span>
    <span class="ambient-btn" onclick="setAmbient('rain')">🌧️ 雨声</span>
    <span class="ambient-btn" onclick="setAmbient('forest')">🌲 森林</span>
    <span class="ambient-btn" onclick="setAmbient('cafe')">☕ 咖啡馆</span>
  </div>
</div>

<script>
// ==================== 数据核心 ====================
const STORAGE_KEY = 'fashuo_v14';
let D = {
  domain:'major', nav:'daily', dateOffset:0,
  tasks:{}, templates:[], errors:{major:[],politics:[]},
  knowledge:{major:[],politics:[]}, recites:{major:[],politics:[]},
  words:[], exams:[], engErrors:[],
  settings:{theme:'light',bgImage:'',bgOpacity:0.2,nightMode:false,accentColor:'#5B9BD5', examDate:'',navOpacity:0.45,navBlur:18},
  presetChapters:{major:[],politics:[]},
  profile:{nickname:'小法硕',avatar:''},
  achievements:[], pomodoroHistory:[]
};

const ACHIEVEMENTS = [
  {id:'streak7', name:'七日修士', icon:'🔥', cond:()=>getStreak()>=7},
  {id:'streak30', name:'月度坚持', icon:'⭐', cond:()=>getStreak()>=30},
  {id:'total100h', name:'百时战神', icon:'⏰', cond:()=>getTotalHours()>=100},
  {id:'error80', name:'翻盘大师', icon:'🎯', cond:()=>getAvgErrorAccuracy()>=80},
  {id:'recite50', name:'记忆达人', icon:'💡', cond:()=>getReciteMastered()>=50},
];

function getStreak(){let s=0;const d=new Date();d.setHours(0,0,0,0);while(true){const ds=d.toISOString().split('T')[0];const t=D.tasks[ds];if(t&&t.length>0&&t.some(x=>x.done)){s++;d.setDate(d.getDate()-1)}else break}return s}
function getTotalHours(){let m=0;Object.values(D.tasks).forEach(a=>a.forEach(t=>{if(t.done)m+=t.duration||30}));return m/60}
function getAvgErrorAccuracy(){const a=[...D.errors.major,...D.errors.politics];if(!a.length)return 0;return a.reduce((s,e)=>s+predictAcc(e),0)/a.length}
function getReciteMastered(){return [...D.recites.major,...D.recites.politics].filter(k=>k.stage>=5).length}
function checkAchievements(){let u=false;ACHIEVEMENTS.forEach(a=>{if(!D.achievements.includes(a.id)&&a.cond()){D.achievements.push(a.id);u=true;toast(`🏅 解锁成就：${a.name}`)}});if(u)save()}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(D))}
function load(){
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(d){D={...D,...d};
    if(!D.recites)D.recites={major:[],politics:[]};if(!D.presetChapters)D.presetChapters={major:[],politics:[]};
    if(!D.profile)D.profile={nickname:'小法硕',avatar:''};if(!D.engErrors)D.engErrors=[];
    if(!D.achievements)D.achievements=[];if(!D.pomodoroHistory)D.pomodoroHistory=[];
    if(!D.settings.examDate)D.settings.examDate='';
    if(D.settings.navOpacity===undefined)D.settings.navOpacity=0.45;
    if(D.settings.navBlur===undefined)D.settings.navBlur=18;
  }}catch(e){}
}
load();

function applyNavStyle(){
  const nav=document.getElementById('sidebar');
  if(nav){
    const r=D.settings.navOpacity,g=D.settings.navBlur;
    nav.style.background=`rgba(255,255,255,${r})`;
    nav.style.backdropFilter=`blur(${g}px)`;nav.style.webkitBackdropFilter=`blur(${g}px)`;
    document.documentElement.style.setProperty('--nav-bg',`rgba(255,255,255,${r})`);
    document.documentElement.style.setProperty('--nav-blur',`${g}px`);
  }
}

function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>c.innerHTML='',2000)}
function esc(s){return String(s||'').replace(/</g,'&lt;')}
function todayStr(){const d=new Date();d.setDate(d.getDate()+D.dateOffset);return d.toISOString().split('T')[0]}
function fmtDate(s){const d=new Date(s);return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
function domLabel(){const m={major:'专业课',politics:'政治',english:'英语'};return m[D.domain]||'专业课'}

function updateGreeting(){
  const h=new Date().getHours();let g='';
  if(h<6)g='夜深了，注意休息 🌙';else if(h<9)g='早安 ☀️';else if(h<12)g='上午好 🌤️';else if(h<14)g='中午好 ☀️';else if(h<18)g='下午好 🌈';else if(h<22)g='晚上好 🌙';else g='夜深了 🌙';
  document.getElementById('greetingText').textContent=`👋 ${g}，${D.profile.nickname}`;
}

function updateAppBg(){
  const bg=document.getElementById('appBg');
  if(D.settings.bgImage){bg.style.backgroundImage=`url(${D.settings.bgImage})`;bg.style.opacity='1'}
  else{bg.style.backgroundImage='';bg.style.opacity='1'}
}

function renderAll(){renderNav();renderDomains();showModule();updateAppBg();updateGreeting();checkAchievements();applyNavStyle();save()}

function renderNav(){
  const s=document.getElementById('sidebar');
  let items=[
    {k:'daily',i:'📋',l:'每日计划'},{k:'error',i:'📝',l:'错题本'},
    {k:'knowledge',i:'📚',l:'知识点库'},{k:'recite',i:'💡',l:'背诵'},{k:'settings',i:'⚙️',l:'设置'}
  ];
  if(D.domain==='english') items.push({k:'english',i:'🔤',l:'单词'});
  const av=D.profile.avatar?`<img src="${D.profile.avatar}" alt="avatar">`:'👤';
  const earned=ACHIEVEMENTS.filter(a=>D.achievements.includes(a.id));
  s.innerHTML=`
    <div class="avatar-wrap" onclick="uploadAvatar()" style="${D.profile.avatar?'background-image:url('+D.profile.avatar+');background-size:cover':''}">${D.profile.avatar?'':av}</div>
    <div class="nick" onclick="editNickname()">${esc(D.profile.nickname)}</div>`;
  items.forEach(it=>{
    const d=document.createElement('div');
    d.className='nav-item'+(D.nav===it.k?' active':'');
    d.innerHTML=`<span class="icon">${it.i}</span><span class="label">${it.l}</span>`;
    d.onclick=()=>{D.nav=it.k;renderAll()};s.appendChild(d)
  });
  if(earned.length){
    const sec=document.createElement('div');sec.className='achievement-section';
    sec.innerHTML=`<div class="achievement-title">🏆 成就</div><div class="achievement-badges">${earned.map(a=>`<span class="badge-icon earned" title="${a.name}">${a.icon}</span>`).join('')}</div>`;
    s.appendChild(sec)
  }
}

function renderDomains(){
  const c=document.getElementById('domainTabs');
  const ds=[{k:'major',i:'📖',l:'专业课'},{k:'politics',i:'🇨🇳',l:'政治'},{k:'english',i:'🌐',l:'英语'}];
  c.innerHTML=ds.map(d=>`<div class="dom${D.domain===d.k?' active':''}" onclick="switchDomain('${d.k}')"><span>${d.i}</span><span>${d.l}</span></div>`).join('')
}

function switchDomain(k){D.domain=k;if(k==='english')D.nav='english';else if(D.nav==='english')D.nav='daily';D.dateOffset=0;renderAll()}
function showModule(){
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  const map={daily:renderDaily,error:renderError,knowledge:renderKnowledge,recite:renderRecite,english:renderEnglish,settings:renderSettings};
  const el=document.getElementById(D.nav+'Module');if(el)el.classList.add('active');
  if(map[D.nav])map[D.nav]()
}

function uploadAvatar(){
  const i=document.createElement('input');i.type='file';i.accept='image/*';
  i.onchange=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){D.profile.avatar=ev.target.result;save();renderAll();toast('头像已更新')};r.readAsDataURL(f)};i.click()
}
function editNickname(){const n=prompt('昵称：',D.profile.nickname);if(n!==null&&n.trim()){D.profile.nickname=n.trim();save();renderAll()}}

function getCountdown(){
  if(!D.settings.examDate)return null;
  const now=new Date();now.setHours(0,0,0,0);const exam=new Date(D.settings.examDate);exam.setHours(0,0,0,0);
  return Math.ceil((exam-now)/86400000);
}

// 弹窗管理
function openModal(html){
  const m=document.getElementById('modal');m.innerHTML=html;m.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('show');document.body.style.overflow='';}

// ==================== 每日计划 ====================
function getDayTasks(ds){if(!D.tasks[ds])D.tasks[ds]=[];return D.tasks[ds]}
function renderDaily(){
  const ds=todayStr();const tasks=getDayTasks(ds);const m=document.getElementById('dailyModule');
  const cd=getCountdown();const cdHtml=cd!==null?`<span class="countdown-badge">📅 考研倒计时 <strong>${cd}</strong> 天</span>`:'';
  m.innerHTML=`
    <div class="flex-between" style="margin-bottom:14px">
      <div class="flex"><button class="btn btn-sm" onclick="shiftDate(-1)">◀</button><strong style="font-size:18px">${fmtDate(ds)}</strong><button class="btn btn-sm" onclick="shiftDate(1)">▶</button><button class="btn btn-sm" onclick="D.dateOffset=0;renderAll()">今天</button>${cdHtml}</div>
      <div class="flex">
        <button class="btn btn-sm btn-primary" onclick="openPomodoro()">🍅 专注</button>
        <select id="statRange" onchange="updateStats()" style="width:auto;margin:0;font-size:11px;padding:5px 8px"><option value="week">本周</option><option value="month">本月</option><option value="all">全部</option></select>
        <button class="btn btn-sm" onclick="toggleStats()">📊 统计</button>
      </div>
    </div>
    <div id="taskListView">${renderTaskList(tasks,ds)}</div>
    <div id="statsView" style="display:none">
      <div class="card"><strong>📈 学习热力图</strong><div class="heatmap-grid" id="heatmap"></div></div>
      <div class="stats-row" id="statsNumbers"></div>

function updateStats(){
  const range=document.getElementById('statRange')?.value||'week';const now=new Date(todayStr());let days=[];
  if(range==='week'){for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0])}}
  else if(range==='month'){for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0])}}
  else{const all=Object.keys(D.tasks).sort();if(all.length){const s=new Date(all[0]);const e=new Date(all[all.length-1]);for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))days.push(d.toISOString().split('T')[0])}}
  let tm=0,cp=0,tt=0;const hd={};
  days.forEach(ds=>{const arr=D.tasks[ds]||[];let dm=0,dd=0;arr.forEach(t=>{dm+=t.duration||30;if(t.done)dd++;tt++});tm+=dm;cp+=dd;hd[ds]={min:dm,done:dd,total:arr.length}});
  const hg=document.getElementById('heatmap');if(hg){let h='';days.forEach(ds=>{const hh=hd[ds]||{min:0,done:0,total:0};const r=hh.total?hh.done/hh.total:0;let c='#eee';if(hh.total>0){if(r>=0.8)c=D.settings.accentColor;else if(r>=0.5)c=D.settings.accentColor+'99';else if(r>0)c=D.settings.accentColor+'55';else c=D.settings.accentColor+'22'}h+=`<div class="heatmap-cell" style="background:${c}" title="${ds}: ${hh.done}/${hh.total}"></div>`});hg.innerHTML=h}
  const sn=document.getElementById('statsNumbers');if(sn)sn.innerHTML=`<div class="stat-mini"><div class="val">${(tm/60).toFixed(1)}h</div><div class="lbl">总专注</div></div><div class="stat-mini"><div class="val">${days.length?(tm/60/days.length).toFixed(1):'0'}h</div><div class="lbl">日均</div></div><div class="stat-mini"><div class="val">${cp}</div><div class="lbl">已完成</div></div><div class="stat-mini"><div class="val">${tt?Math.round(cp/tt*100):0}%</div><div class="lbl">完成率</div></div>`;
  drawTrendChart();const rc=document.getElementById('reportContent');if(rc)rc.innerHTML=`<p>📅 范围：${days.length}天  |  ⏱ 总专注：${(tm/60).toFixed(1)}h  |  ✅ 完成率：${tt?Math.round(cp/tt*100):0}%</p>`;drawExamChart()
}
function drawTrendChart(){
  const canvas=document.getElementById('trendCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const w=canvas.parentElement.clientWidth-20;canvas.width=w;canvas.height=120;
  const now=new Date();const data=[];for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const tasks=D.tasks[ds]||[];data.push(tasks.reduce((s,t)=>s+(t.duration||30),0)/60)}
  const pad=30,ch=80,cw=w-pad*2;ctx.clearRect(0,0,w,140);const max=Math.max(1,...data);
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}
  ctx.beginPath();ctx.strokeStyle=D.settings.accentColor;ctx.lineWidth=2.5;data.forEach((v,i)=>{const x=pad+(cw/29)*i;const y=pad+ch-(v/max*ch);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke()
}
function addExamRecord(){const s=prompt('科目：');if(!s)return;const sc=parseFloat(prompt('分数：'));if(isNaN(sc))return;D.exams.push({date:todayStr(),subject:s,score:sc});save();updateStats();toast('成绩已记录')}
function drawExamChart(){
  const canvas=document.getElementById('examCanvas');if(!canvas||!D.exams.length)return;
  const ctx=canvas.getContext('2d');const w=canvas.parentElement.clientWidth-20;canvas.width=w;canvas.height=140;
  const ex=[...D.exams].sort((a,b)=>new Date(a.date)-new Date(b.date));const pad=25,cw=w-pad*2,ch=100;
  ctx.clearRect(0,0,w,160);const maxS=Math.max(...ex.map(e=>e.score),100),minS=Math.min(...ex.map(e=>e.score),0);
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}
  ctx.beginPath();ctx.strokeStyle=D.settings.accentColor;ctx.lineWidth=2.5;
  ex.forEach((e,i)=>{const x=pad+(cw/(Math.max(ex.length-1,1)))*i;const y=pad+ch-((e.score-minS)/(maxS-minS||1))*ch;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke()
}

let pomodoroInterval=null,pomodoroSeconds=25*60,pomodoroRunning=false,ambientAudio=null,ambientType='none';

function setPomodoro(min){pomodoroSeconds=min*60;updateTimerDisplay();pomodoroRunning=false;clearInterval(pomodoroInterval);document.getElementById('pomodoroStartBtn').textContent='开始专注'}
function togglePomodoro(){pomodoroRunning?pausePomodoro():startPomodoro()}
function startPomodoro(){pomodoroRunning=true;document.getElementById('pomodoroStartBtn').textContent='暂停';pomodoroInterval=setInterval(()=>{pomodoroSeconds--;updateTimerDisplay();if(pomodoroSeconds<=0)finishPomodoro()},1000)}
function pausePomodoro(){pomodoroRunning=false;clearInterval(pomodoroInterval);document.getElementById('pomodoroStartBtn').textContent='继续'}
function updateTimerDisplay(){const m=Math.floor(pomodoroSeconds/60),s=pomodoroSeconds%60;document.getElementById('pomodoroTimer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function finishPomodoro(){clearInterval(pomodoroInterval);pomodoroRunning=false;document.getElementById('pomodoroStartBtn').textContent='开始专注';pomodoroSeconds=25*60;updateTimerDisplay();const ds=todayStr();getDayTasks(ds).push({id:Date.now().toString(),name:'🍅 专注',planTime:'',duration:25,done:true});D.pomodoroHistory.push({date:ds,duration:25});save();renderDaily();stopAmbient();closePomodoro();toast('🍅 专注完成！+25分钟')}
function setAmbient(type){
  stopAmbient();ambientType=type;
  document.querySelectorAll('.ambient-btn').forEach(b=>b.classList.remove('active'));
  if(type==='none')return;
  document.querySelector(`.ambient-btn[onclick*="${type}"]`)?.classList.add('active');
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const bufferSize=2*ctx.sampleRate,buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
    const data=buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      if(type==='rain'){data[i]=Math.random()*2-1;if(i%3===0)data[i]*=0.3}
      else if(type==='forest'){data[i]=(Math.random()*2-1)*0.5;if(Math.random()<0.02)data[i]*=2}
      else if(type==='cafe'){data[i]=(Math.random()*2-1)*0.7;if(Math.random()<0.01)data[i]*=3}
      else data[i]=0;
    }
    const source=ctx.createBufferSource();source.buffer=buffer;source.loop=true;
    const gain=ctx.createGain();gain.gain.value=0.3;
    source.connect(gain);gain.connect(ctx.destination);source.start();
    ambientAudio={ctx,source,gain};
  }catch(e){}
}
function stopAmbient(){if(ambientAudio){try{ambientAudio.source.stop()}catch(e){}try{ambientAudio.ctx.close()}catch(e){}ambientAudio=null}}

function addKnowledgeToRecite(i){const k=D.knowledge[D.domain][i];if(!k)return;D.recites[D.domain].push({id:Date.now().toString(),subject:k.subject,chapter:k.chapter,content:k.content,stage:0,nextReview:todayStr()});save();toast('已加入背诵')}

// ==================== 背诵 ====================
function renderRecite(){
  const m=document.getElementById('reciteModule');const all=D.recites[D.domain]||[];
  m.innerHTML=`<h3>💡 背诵管理 · ${domLabel()} <span class="badge">${all.length}</span></h3>
    <div class="flex" style="margin-bottom:8px"><input class="inline-input" id="reciteSearch" placeholder="🔍 搜索" oninput="renderRecite()" style="flex:1;min-width:200px"><input class="inline-input" id="reciteSubject" placeholder="科目"><input class="inline-input" id="reciteChapter" placeholder="章节"><input class="inline-input" id="reciteContent" placeholder="内容" style="flex:2"><button class="btn btn-primary btn-sm" onclick="addReciteItem()">+添加</button></div>`;
  const q=(document.getElementById('reciteSearch')?.value||'').toLowerCase();
  let filtered=all;if(q)filtered=filtered.filter(k=>k.subject.toLowerCase().includes(q)||k.chapter.toLowerCase().includes(q)||k.content.toLowerCase().includes(q));
  const due=filtered.filter(k=>k.nextReview&&k.nextReview<=todayStr()),fuzzy=filtered.filter(k=>k.stage>=1&&k.stage<5&&k.nextReview>todayStr()),mastered=filtered.filter(k=>k.stage>=5);
  const container=document.createElement('div');
  container.innerHTML=`
    <div class="recite-zone"><h4><span class="zone-dot" style="background:#D05555"></span>待复习 (${due.length})</h4>${due.map((k,i)=>{const ai=all.indexOf(k);return reciteCard(k,ai)}).join('')||'<div class="card">暂无</div>'}</div>
    <div class="recite-zone"><h4><span class="zone-dot" style="background:var(--accent3)"></span>模糊中 (${fuzzy.length})</h4>${fuzzy.map((k,i)=>{const ai=all.indexOf(k);return reciteCard(k,ai)}).join('')||'<div class="card">暂无</div>'}</div>
    <div class="recite-zone"><h4><span class="zone-dot" style="background:var(--accent2)"></span>已掌握 (${mastered.length})</h4>${mastered.map((k,i)=>{const ai=all.indexOf(k);return reciteCard(k,ai)}).join('')||'<div class="card">暂无</div>'}</div>`;
  m.appendChild(container);
}
function reciteCard(k,idx){return `<div class="card flex-between"><div><strong>${esc(k.subject)} · ${esc(k.chapter)}</strong><br><small>${esc(k.content)}</small><br><small>阶段:${k.stage||0} | 下次:${k.nextReview||'未安排'}</small></div><div class="flex"><button class="btn btn-sm btn2" onclick="reciteFeedback(${idx},'good')">✅</button><button class="btn btn-sm btn3" onclick="reciteFeedback(${idx},'fuzzy')">🤔</button><button class="btn btn-sm" onclick="reciteFeedback(${idx},'forgot')">❌</button><button class="btn btn-sm" onclick="deleteReciteItem(${idx})">🗑</button></div></div>`}
function addReciteItem(){const s=document.getElementById('reciteSubject')?.value.trim(),c=document.getElementById('reciteChapter')?.value.trim(),co=document.getElementById('reciteContent')?.value.trim();if(!s||!co)return toast('必填');D.recites[D.domain].push({id:Date.now().toString(),subject:s,chapter:c,content:co,stage:0,nextReview:todayStr()});save();renderRecite();toast('已添加')}
function deleteReciteItem(i){D.recites[D.domain].splice(i,1);save();renderRecite()}
function reciteFeedback(idx,type){const k=D.recites[D.domain][idx];if(!k)return;const intervals=[1,2,4,7,15,30,60,120];if(type==='good')k.stage=Math.min((k.stage||0)+1,intervals.length-1);else if(type==='fuzzy')k.stage=Math.max((k.stage||0)-1,0);else k.stage=0;k.nextReview=new Date(Date.now()+intervals[k.stage]*86400000).toISOString().split('T')[0];save();renderRecite()}

// ==================== 英语单词（多选弹窗已加关闭） ====================
let wordView='all';
function renderEnglish(){
  D.domain='english';const m=document.getElementById('englishModule');
  m.innerHTML=`<div class="flex-between"><h3>🔤 英语单词 <span class="badge">${D.words.length}</span></h3>
      <button class="btn btn-primary btn-sm" onclick="startWordQuiz()">📝 多选测试</button>
    </div>
    <div class="card">
      <div class="flex"><input class="inline-input" id="wordEnInput" placeholder="英文"><input class="inline-input" id="wordCnInput" placeholder="中文"><button class="btn btn-primary btn-sm" onclick="addWordInline()">添加</button></div>
    </div>
    <div class="flex" style="margin:8px 0"><button class="btn btn-sm" onclick="toggleWordView('all')">全部</button><button class="btn btn-sm" onclick="toggleWordView('en')">仅英文</button><button class="btn btn-sm" onclick="toggleWordView('cn')">仅中文</button><input class="inline-input" id="wordSearch" placeholder="搜索" oninput="renderWordList()" style="flex:1"></div>
    <div id="wordListContainer"></div>`;
  renderWordList()
}
function renderWordList(){
  const container=document.getElementById('wordListContainer');if(!container)return;
  const q=(document.getElementById('wordSearch')?.value||'').toLowerCase();
  let list=D.words;if(q)list=list.filter(w=>w.en.toLowerCase().includes(q)||w.cn.includes(q));
  if(!list.length){container.innerHTML='<div class="card" style="text-align:center;color:var(--sub)">暂无单词</div>';return}
  let html='<table class="word-table">';
  list.forEach((w,i)=>{
    let displayEn=esc(w.en),displayCn=esc(w.cn);
    if(wordView==='en')displayCn='';
    else if(wordView==='cn')displayEn='';
    html+=`<tr>
      <td class="en-col">${displayEn}</td>
      <td class="cn-col">${displayCn}</td>
      <td class="action-col">
        <button class="btn btn-sm" onclick="editWord(${i})">✎</button>
        <button class="btn btn-sm" onclick="deleteWord(${i})">✕</button>
      </td>
    </tr>`;
  });
  html+='</table>';
  container.innerHTML=html;
}
function addWordInline(){
  const en=document.getElementById('wordEnInput')?.value.trim(),cn=document.getElementById('wordCnInput')?.value.trim();
  if(!en||!cn)return toast('英文和中文都要填');
  D.words.push({en,cn,stage:0,nextReview:todayStr()});save();renderEnglish();toast('单词已添加');
}
function editWord(i){
  const w=D.words[i];if(!w)return;
  openModal(`<div class="modal-box"><h3>编辑单词</h3>
    <input id="editWordEn" placeholder="英文" value="${esc(w.en)}">
    <input id="editWordCn" placeholder="中文" value="${esc(w.cn)}">
    <div style="text-align:right;margin-top:12px"><button class="btn" onclick="closeModal()">取消</button> <button class="btn btn-primary" onclick="saveWordEdit(${i})">保存</button></div></div>`);
}
function saveWordEdit(i){
  const en=document.getElementById('editWordEn').value.trim(),cn=document.getElementById('editWordCn').value.trim();
  if(!en||!cn)return toast('不能为空');
  D.words[i].en=en;D.words[i].cn=cn;save();closeModal();renderEnglish();
}
function deleteWord(i){D.words.splice(i,1);save();renderEnglish()}
function toggleWordView(v){wordView=v;renderEnglish()}
function startWordQuiz(){
  if(D.words.length<4)return toast('至少4个');
  const p=[...D.words].sort(()=>Math.random()-0.5);const c=p[0];const o=[c,...p.slice(1,4)].sort(()=>Math.random()-0.5);
  openModal(`<div class="modal-box"><h3>选择正确释义</h3><h2>${esc(c.en)}</h2>${o.map(x=>`<button class="btn" style="display:block;width:100%;margin:4px 0" onclick="checkQuiz('${esc(x.cn)}','${esc(c.cn)}','${esc(c.en)}')">${esc(x.cn)}</button>`).join('')}<div style="text-align:right;margin-top:12px"><button class="btn" onclick="closeModal()">关闭</button></div><div id="quizResult"></div></div>`);
}
function checkQuiz(ch,co,en){
  const ok=ch===co;
  document.getElementById('quizResult').innerHTML=ok?'<span style="color:var(--accent2)">✅ 正确</span>':'<span style="color:#D05555">❌ 答案：'+co;
  const w=D.words.find(x=>x.en===en);
  if(w){const iv=[1,2,4,7,15,30,60,120];if(ok)w.stage=Math.min((w.stage||0)+1,iv.length-1);else w.stage=0;w.nextReview=new Date(Date.now()+iv[w.stage]*86400000).toISOString().split('T')[0];save()}
}

// ==================== 设置 ====================
function renderSettings(){
  const m=document.getElementById('settingsModule');
  const presets=['#5B9BD5','#6BBF8A','#F0A060','#9B7EC4','#D05555','#5BA0A0','#E08090','#C8956C','#8A8A8A','#4A90D9'];
  m.innerHTML=`
    <div class="card"><h3>🎨 主题取色</h3><div class="flex" style="flex-wrap:wrap;gap:6px;margin:8px 0">${presets.map(c=>`<span style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;display:inline-block;border:3px solid ${D.settings.accentColor===c?'var(--text)':'transparent'}" onclick="pickColor('${c}')"></span>`).join('')}<input type="color" value="${D.settings.accentColor}" onchange="pickColor(this.value)" style="width:40px;height:32px"></div>
      <div class="slider-row"><span>导航透明度</span><input type="range" min="0" max="100" value="${Math.round(D.settings.navOpacity*100)}" onchange="D.settings.navOpacity=this.value/100;applyNavStyle();save()"></div>
      <div class="slider-row"><span>毛玻璃强度</span><input type="range" min="0" max="40" value="${D.settings.navBlur}" onchange="D.settings.navBlur=parseInt(this.value);applyNavStyle();save()"></div>
      <button class="btn btn-sm" onclick="toggleNight()">${D.settings.nightMode?'☀️ 白天':'🌙 夜晚'}模式</button></div>
    <div class="card"><h3>🖼 背景图</h3><input type="file" accept="image/*" onchange="uploadBg(this)"><input type="text" id="bgUrl" placeholder="图片URL" value="${D.settings.bgImage||''}"><button class="btn btn-sm" onclick="applyBgUrl()">应用</button><button class="btn btn-sm" onclick="removeBg()">清除</button></div>
    <div class="card"><h3>📦 数据</h3><button class="btn btn-sm" onclick="exportAll()">导出JSON</button><button class="btn btn-sm" onclick="importAll()">导入</button></div>
    <div class="card"><h3>📅 考研日期</h3><input type="date" id="examDateInput" value="${D.settings.examDate||''}" onchange="D.settings.examDate=this.value;save();renderAll()"><br><small>设置后每日计划顶部显示倒计时</small></div>`;
}
function pickColor(c){D.settings.accentColor=c;document.documentElement.style.setProperty('--accent',c);document.documentElement.style.setProperty('--accent-light',c+'25');save();renderSettings();toast('主题色已更新')}
function toggleNight(){D.settings.nightMode=!D.settings.nightMode;document.body.classList.toggle('night',D.settings.nightMode);save();renderSettings()}
function uploadBg(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){D.settings.bgImage=e.target.result;updateAppBg();save()};r.readAsDataURL(f)}
function applyBgUrl(){const u=document.getElementById('bgUrl')?.value.trim();if(u){D.settings.bgImage=u;updateAppBg();save()}}
function removeBg(){D.settings.bgImage='';updateAppBg();save()}
function exportAll(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='法硕督学备份.json';a.click()}
function importAll(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);D={...D,...d};save();renderAll();toast('导入成功')}catch(ex){toast('格式错误')}};r.readAsText(f)};i.click()}

// ==================== 初始化 ====================
function init(){
  document.documentElement.style.setProperty('--accent',D.settings.accentColor||'#5B9BD5');
  document.documentElement.style.setProperty('--accent-light',(D.settings.accentColor||'#5B9BD5')+'25');
  if(D.settings.nightMode)document.body.classList.add('night');
  updateAppBg();updateGreeting();applyNavStyle();
  const ds=todayStr();const ex=getDayTasks(ds);const en=new Set(ex.map(t=>t.name));
  D.templates.forEach(tm=>{if(!en.has(tm.name)){const dow=new Date(ds).getDay()||7;if(!tm.repeatDays||tm.repeatDays.includes(String(dow))){ex.push({id:Date.now().toString(),name:tm.name,planTime:tm.planTime,duration:tm.duration,done:false,repeatDays:tm.repeatDays})}}});
  renderAll()
}
init();
window.addEventListener('beforeunload',save);
</script>
</body>
</html>
